# MODELS.yaml — candidate menu for the text_to_sql sample.
# Prices are USD per **million** tokens (in / out). Keys are short handles; model_id is the real route slug.
#
# NOTE: this menu was hand-picked, NOT auto-generated via `nishiki models`. Two reasons:
#   (1) reproducibility — `nishiki models` reads the live OpenRouter catalog, which shifts day to day;
#       a bundled sample should look the same for everyone, so the candidates are pinned here.
#   (2) intent — to show KOI's point (cheap models win on quality-per-dollar) we need candidates
#       spanning the price ladder (frontier → dirt cheap), so we reuse the same 4 as the span_extract
#       sample. In a real project you'd instead let `nishiki init --source openrouter` assemble the
#       menu from live prices (spread across tiers) plus the current model extracted from your code.
models:
  gpt54pro:
    origin: openrouter
    model_id: "openai/gpt-5.4-pro"
    call: openai_compatible
    in: 30.0
    out: 180.0
    tier: high
    life: ACTIVE
    quality_hint: unknown
    note: "frontier baseline — most expensive"
  gpt4:
    origin: openrouter
    model_id: "openai/gpt-4"
    call: openai_compatible
    in: 30.0
    out: 60.0
    tier: high
    life: ACTIVE
    quality_hint: unknown
    note: "older frontier"
  glm46:
    origin: openrouter
    model_id: "z-ai/glm-4.6"
    call: openai_compatible
    in: 0.4
    out: 1.7
    tier: mid
    life: ACTIVE
    quality_hint: unknown
    note: "cheap challenger (~75x cheaper input than the frontier)"
  deepseek:
    origin: openrouter
    model_id: "deepseek/deepseek-v4-pro"
    call: openai_compatible
    in: 0.4
    out: 0.9
    tier: mid
    life: ACTIVE
    quality_hint: unknown
    note: "cheap challenger"
  llama3b:
    origin: openrouter
    model_id: "meta-llama/llama-3.2-3b-instruct"
    call: openai_compatible
    in: 0.1
    out: 0.3
    tier: low
    life: ACTIVE
    quality_hint: unknown
    note: "ultra-cheap 3B model — the pick a naive cost-only router would make (cheapest of all)"
