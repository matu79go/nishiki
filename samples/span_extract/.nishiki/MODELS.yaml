# MODELS.yaml — candidate menu for the span_extract sample.
# Prices are USD per **million** tokens (in / out), taken from the live OpenRouter catalog
# (`nishiki models`, no key). Keys are short handles; model_id is the real route slug.
# Spanning the price ladder so KOI (quality ÷ cost) has something to rank.
models:
  gpt54pro:
    origin: openrouter
    model_id: "openai/gpt-5.4-pro"
    call: openai_compatible
    in: 30.0
    out: 180.0
    tier: high
    life: ACTIVE
    quality_hint: unknown
    note: "frontier baseline — most expensive"
